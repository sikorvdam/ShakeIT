name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.2'
          channel: 'stable'

      - name: Debug info
        run: |
          echo "=== Java ==="
          java -version
          echo "=== Flutter ==="
          flutter --version
          echo "=== Flutter doctor ==="
          flutter doctor -v
          
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shakeit-recipes.apk
          path: build/app/outputs/flutter-apk/app-debug.apk